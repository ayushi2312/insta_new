kind: Deployment
apiVersion: apps/v1
metadata:
  name: auth-deployment
  namespace: auth-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec: 
      containers: 
       - name: auth
         image: ayushi2312/auth-insta
         ports:
            - containerPort: 3001
        
