apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
  namespace: front-namespace

spec:
  replicas: 2
  selector:
    matchLabels:
      app: front

  template:
    metadata:
      labels:
        app: front

    spec:
      containers:
        - name: front
          image: ayushi2312/frontend-insta
          ports:
            - containerPort: 3000